<div style="padding: 40px; font-family: sans-serif; max-width: 800px; margin: auto;">

  <h1>Currency Dashboard</h1>

  <div style="background: #F4F4F9; padding: 20px; border-radius: 8px; margin-bottom: 20px;">

    <h3>Aktualizacja bazy (NBP)</h3>
    <button (click)="fetchFromNBP()" [disabled]="isLoading" style="padding: 10px 20px; background: #28A745; color: white; border: none; cursor: pointer; border-radius: 5px;">
      Poberz dzisiejsze kursy z NBP
    </button>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #DDD;">

    <h3>Przeglądanie kursów</h3>
    <input type="date" #dateInput style="padding: 8px; margin-right: 10px; border: 1px solid #CCC; border-radius: 4px;">

    <button (click)="getRatesForDate(dateInput.value)" [disabled]="isLoading" style="padding: 10px 20px; background: #007BFF; color: white; border: none; cursor: pointer; border-radius: 5px;">
      Wyświetl tablicę
    </button>

  </div>
  
  @if (message) {
    <div style="padding: 15px; background: #E2E3E5; border-radius: 5px; margin-bottom: 20px;">
      <strong>Status:</strong> {{ message }}
    </div>
  }

  @if (rates.length > 0) {
    <table style="width: 100%; border-collapse: collapse; text-align: left; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
      <thead>
        <tr style="background: #007BFF; color: white;">
          <th style="padding: 12px; border: 1px solid #DDD">Kod waluty</th>
          <th style="padding: 12px; border: 1px solid #DDD">Nazwa waluty</th>
          <th style="padding: 12px; border: 1px solid #DDD">Kurs średni (PLN)</th>
        </tr>
      </thead>
      <tbody>
        @for (rate of rates; track rate.code) {
          <tr style="background: white;">
            <td style="padding: 10px; border: 1px solid #DDD; font-weight: bold;">{{ rate.code }}</td>
            <td style="padding: 10px; border: 1px solid #DDD;">{{ rate.currency }}</td>
            <td style="padding: 10px; border: 1px solid #DDD; color: #D9534F; font-weight: bold;">{{ rate.mid }}</td>
          </tr>
        }
      </tbody>
    </table>
  }

</div>
